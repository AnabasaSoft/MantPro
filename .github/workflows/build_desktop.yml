name: Construir Desktop (Windows, Linux Binario & AppImage)

on:
  push:
    #branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # JOB 1: WINDOWS (.exe y Setup)
  # ------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PyQt6 reportlab requests flask qrcode xlsxwriter

    - name: Generar EXE
      run: |
        pyinstaller --noconsole --onefile --name=MantPro_WIN --icon=icono.png main.py

    - name: Build Windows Installer (Inno Setup)
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF_NAME}
        CLEAN_VERSION=${TAG_NAME#v}
        # Si ejecutamos manualmente sin tag, le ponemos 0.0 de rescate
        if [ -z "$CLEAN_VERSION" ] || [ "$CLEAN_VERSION" == "main" ]; then
          CLEAN_VERSION="0.0"
        fi
        iscc //DMyAppVersion="$CLEAN_VERSION" mantpro.iss

    - name: Subir EXE (Artefacto)
      uses: actions/upload-artifact@v4
      with:
        name: MantPro-Windows-EXE
        path: dist/MantPro_WIN.exe

    - name: Publicar EXEs en Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/MantPro_WIN.exe
          Output/MantPro_Setup_v*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ------------------------------------------------------------------
  # JOB 2: LINUX (Binario, AppImage, DEB y RPM)
  # ------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías del sistema y FPM
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2 file build-essential ruby ruby-dev rubygems rpm
        sudo gem install fpm

    - name: Instalar Dependencias Python
      run: |
        pip install pyinstaller
        pip install PyQt6 reportlab requests flask qrcode xlsxwriter

    # --- PASO 1: GENERAR BINARIO STANDALONE ---
    - name: Generar Binario Linux
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=icono.png --add-data "icono.png:." --name "MantPro_Linux" main.py

    # --- PASO 2: SUBIR BINARIO SUELTO ---
    - name: Subir Binario Linux (Artefacto)
      uses: actions/upload-artifact@v4
      with:
        name: MantPro-Linux-Binario
        path: dist/MantPro_Linux

    # --- PASO 3: PREPARAR APPDIR ---
    - name: Preparar AppDir
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        cp dist/MantPro_Linux AppDir/usr/bin/mantpro
        cp icono.png AppDir/mantpro.png
        cp icono.png AppDir/.DirIcon

        cat > AppDir/mantpro.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=MantPro
        Exec=mantpro
        Icon=mantpro
        Categories=Utility;
        Terminal=false
        EOF

        cat > AppDir/AppRun <<EOF
        #!/bin/sh
        SELF=\$(readlink -f "\$0")
        HERE=\${SELF%/*}
        export PATH="\${HERE}/usr/bin:\${PATH}"
        export LD_LIBRARY_PATH="\${HERE}/usr/lib:\${LD_LIBRARY_PATH}"
        exec "\${HERE}/usr/bin/mantpro" "\$@"
        EOF
        chmod +x AppDir/AppRun

    # --- PASO 4: EMPAQUETAR APPIMAGE ---
    - name: Crear AppImage
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ./appimagetool-x86_64.AppImage --appimage-extract

        ./squashfs-root/AppRun AppDir MantPro-Linux-x86_64.AppImage

    - name: Subir AppImage (Artefacto)
      uses: actions/upload-artifact@v4
      with:
        name: MantPro-Linux-AppImage
        path: MantPro-Linux-x86_64.AppImage

    # --- PASO 5: EMPAQUETAR DEB Y RPM ---
    - name: Crear paquetes DEB y RPM
      run: |
        TAG_NAME=${GITHUB_REF_NAME}
        CLEAN_VERSION=${TAG_NAME#v}
        if [ -z "$CLEAN_VERSION" ] || [ "$CLEAN_VERSION" == "main" ]; then
          CLEAN_VERSION="1.0"
        fi

        # 1. Preparar una carpeta limpia con la estructura de Linux
        mkdir -p LinuxPkg/usr/bin
        mkdir -p LinuxPkg/usr/share/pixmaps
        mkdir -p LinuxPkg/usr/share/applications

        # 2. Copiar los archivos en sus rutas correctas
        cp dist/MantPro_Linux LinuxPkg/usr/bin/mantpro
        cp icono.png LinuxPkg/usr/share/pixmaps/mantpro.png
        cp AppDir/mantpro.desktop LinuxPkg/usr/share/applications/mantpro.desktop

        # 3. Generar el paquete DEB
        fpm -s dir -t deb -n mantpro -v "$CLEAN_VERSION" \
          --maintainer "AnabasaSoft" \
          --description "Sistema Integral de Mantenimiento Industrial" \
          -C LinuxPkg .

        # 4. Generar el paquete RPM
        fpm -s dir -t rpm -n mantpro -v "$CLEAN_VERSION" \
          --maintainer "AnabasaSoft" \
          --description "Sistema Integral de Mantenimiento Industrial" \
          -C LinuxPkg .

    # --- PASO 6: PUBLICAR TODO EN RELEASE ---
    - name: Publicar Linux en Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/MantPro_Linux
          MantPro-Linux-x86_64.AppImage
          *.deb
          *.rpm
